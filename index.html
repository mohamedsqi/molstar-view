<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Protein + Ligand</title>
  <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f6f9; }
    h2 { margin: 0; padding: 16px 16px 8px 16px; }
    p { margin: 0; padding: 0 16px 12px 16px; color: #555; }
    #viewer { width: 100%; height: 85vh; background: white; }
  </style>
</head>
<body>
  <h2>Test direct protéine + ligand</h2>
  <p>Protéine = 1a4l_protein.pdb | Ligand = complex1.pdb</p>
  <div id="viewer"></div>

  <script>
    async function loadScene() {
      const proteinRes = await fetch("./1a4l_protein.pdb");
      if (!proteinRes.ok) throw new Error("1a4l_protein.pdb introuvable");
      const protein = await proteinRes.text();

      const ligandRes = await fetch("./complex1.pdb");
      if (!ligandRes.ok) throw new Error("complex1.pdb introuvable");
      const ligand = await ligandRes.text();

      const viewer = $3Dmol.createViewer("viewer", { backgroundColor: "white" });

      // modèle 0 : protéine
      viewer.addModel(protein, "pdb");

      // modèle 1 : ligand / complexe
      viewer.addModel(ligand, "pdb");

      // protéine en cartoon beige
      viewer.setStyle(
        {model: 0, protein: true},
        {cartoon: {color: "#e6d3a3"}}
      );

      // ligand en stick cyan
      viewer.setStyle(
        {model: 1, hetflag: true},
        {stick: {colorscheme: "cyanCarbon", radius: 0.28}}
      );

      viewer.zoomTo();
      viewer.zoom(0.8);
      viewer.render();
    }

    loadScene().catch(err => {
      document.body.innerHTML += "<p style='color:red;padding:16px;'>Erreur : " + err.message + "</p>";
      console.error(err);
    });
  </script>
</body>
</html>
