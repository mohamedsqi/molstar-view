<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Protein-Ligand Viewer</title>
  <script src="https://3Dmol.org/build/3Dmol-min.js"></script>

  <style>
    body { margin:0; font-family: Arial; }
    #viewer { width:100%; height:800px; }
  </style>
</head>

<body>

<h2 style="padding:10px;">Protein + Ligand Viewer</h2>
<div id="viewer"></div>

<script>

let viewer;

async function loadScene() {

    const proteinRes = await fetch("./1a4l_protein.pdb");
    const protein = await proteinRes.text();

    const ligandRes = await fetch("./complex1.pdb");
    const ligand = await ligandRes.text();

    viewer = $3Dmol.createViewer("viewer", {backgroundColor:"white"});

    // PROTEINE
    viewer.addModel(protein, "pdb");

    // LIGAND
    viewer.addModel(ligand, "pdb");

    // STYLE PROTEINE (hélices visibles)
    viewer.setStyle(
        {protein:true},
        {cartoon:{color:"#e6d3a3"}}
    );

    // LIGAND
    viewer.setStyle(
        {hetflag:true},
        {stick:{colorscheme:"cyanCarbon", radius:0.3}}
    );

    // POCHE
    viewer.setStyle(
        {protein:true, within:{distance:6, sel:{hetflag:true}}},
        {stick:{colorscheme:"magentaCarbon", radius:0.25}}
    );

    viewer.zoomTo();
    viewer.render();
}

loadScene();

</script>

</body>
</html>
