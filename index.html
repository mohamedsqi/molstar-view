<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protein-Ligand Viewer</title>
  <script src="https://3Dmol.org/build/3Dmol-min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #222;
    }

    .container {
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    .subtitle {
      margin-bottom: 14px;
      color: #555;
      line-height: 1.5;
    }

    .layout {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }

    .sidepanel {
      width: 320px;
      min-width: 320px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      padding: 18px;
      flex-shrink: 0;
    }

    .viewerpanel {
      flex: 1;
      min-width: 0;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .section-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 15px;
    }

    .checkbox-row input {
      transform: scale(1.15);
      cursor: pointer;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid #aaa;
      flex: 0 0 auto;
    }

    .swatch-beige { background: #e6d3a3; }
    .swatch-magenta { background: #b000b5; }
    .swatch-cyan { background: #00d7df; }
    .swatch-hbond {
      background: repeating-linear-gradient(
        90deg,
        #000 0px,
        #000 6px,
        #fff 6px,
        #fff 10px
      );
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }

    #viewer {
      width: 100%;
      height: 780px;
    }

    .status {
      padding: 12px 16px;
      font-size: 14px;
      color: #555;
      border-top: 1px solid #e5e7eb;
      background: #fafafa;
    }

    .tip {
      margin-top: 18px;
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    @media (max-width: 1100px) {
      .layout {
        flex-direction: column;
      }

      .sidepanel {
        width: 100%;
        min-width: 0;
      }

      #viewer {
        height: 620px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Protein-Ligand Viewer</h1>
    <div class="subtitle">
      Chaîne A uniquement, protéine en cartoon beige, poche catalytique en stick magenta, ligand en cyan, liaisons H en pointillé noir.
    </div>

    <div class="layout">
      <div class="sidepanel">
        <div class="section-title">Légende interactive</div>

        <label class="checkbox-row">
          <input type="checkbox" id="toggleProtein" checked onchange="updateScene()">
          <span class="swatch swatch-beige"></span>
          <span>Hélices / protéine (chaîne A)</span>
        </label>

        <label class="checkbox-row">
          <input type="checkbox" id="togglePocket" checked onchange="updateScene()">
          <span class="swatch swatch-magenta"></span>
          <span>Poche catalytique</span>
        </label>

        <label class="checkbox-row">
          <input type="checkbox" id="toggleLigand" checked onchange="updateScene()">
          <span class="swatch swatch-cyan"></span>
          <span>Ligand</span>
        </label>

        <label class="checkbox-row">
          <input type="checkbox" id="toggleHBonds" checked onchange="updateScene()">
          <span class="swatch swatch-hbond"></span>
          <span>Liaisons H</span>
        </label>

        <div class="button-row">
          <button onclick="resetView()">Reset View</button>
          <button onclick="zoomLigand()">Zoom ligand</button>
          <button onclick="presetPocket()">Preset pocket</button>
          <button onclick="presetCartoon()">Preset cartoon</button>
        </div>

        <div class="tip">
          Le modèle protéique complet est d’abord masqué, puis seule la chaîne A est réaffichée en cartoon beige.
        </div>
      </div>

      <div class="viewerpanel">
        <div id="viewer"></div>
        <div id="status" class="status">Chargement...</div>
      </div>
    </div>
  </div>

  <script>
    let viewer = null;
    let proteinModel = null;
    let ligandModel = null;
    let hbonds = [];

    async function loadScene() {
      const status = document.getElementById("status");
      status.innerText = "Chargement des fichiers...";

      try {
        const proteinRes = await fetch("./1a4l_protein.pdb");
        if (!proteinRes.ok) throw new Error("Impossible de charger 1a4l_protein.pdb");
        const proteinPDB = await proteinRes.text();

        const ligandRes = await fetch("./complex1.pdb");
        if (!ligandRes.ok) throw new Error("Impossible de charger complex1.pdb");
        const ligandPDB = await ligandRes.text();

        viewer = $3Dmol.createViewer("viewer", { backgroundColor: "white" });

        proteinModel = viewer.addModel(proteinPDB, "pdb");
        ligandModel = viewer.addModel(ligandPDB, "pdb");

        hbonds = computeHBonds();

        updateScene();
        viewer.zoomTo({model: 0, chain: "A"});
        viewer.zoom(0.72);
        viewer.render();

        status.innerText = "Structure chargée avec succès";
      } catch (err) {
        status.innerText = "Erreur : " + err.message;
        console.error(err);
      }
    }

    function getCheckboxValue(id) {
      return document.getElementById(id).checked;
    }

    function updateScene() {
      const showProtein = getCheckboxValue("toggleProtein");
      const showPocket = getCheckboxValue("togglePocket");
      const showLigand = getCheckboxValue("toggleLigand");
      const showHBonds = getCheckboxValue("toggleHBonds");

      viewer.setStyle({}, {});
      viewer.removeAllShapes();

      // 1) cacher tout le modèle protéine pour éviter les chaînes B/C/D en lines
      viewer.setStyle(
        {model: 0},
        {line: {hidden: true}, stick: {hidden: true}, sphere: {hidden: true}, cartoon: {hidden: true}}
      );

      // 2) réafficher seulement la chaîne A en cartoon beige
      if (showProtein) {
        viewer.setStyle(
          {model: 0, chain: "A"},
          {cartoon: {color: "#e6d3a3", opacity: 1.0}}
        );
      }

      // 3) poche autour du ligand, seulement sur chaîne A
      if (showPocket) {
        viewer.setStyle(
          {model: 0, chain: "A", within: {distance: 7, sel: {model: 1, hetflag: true}}},
          {stick: {colorscheme: "magentaCarbon", radius: 0.20}}
        );
      }

      // 4) cacher tout le modèle ligand de base, puis ne montrer que les HETATM
      viewer.setStyle(
        {model: 1},
        {line: {hidden: true}, stick: {hidden: true}, sphere: {hidden: true}, cartoon: {hidden: true}}
      );

      if (showLigand) {
        viewer.setStyle(
          {model: 1, hetflag: true},
          {stick: {colorscheme: "cyanCarbon", radius: 0.28}}
        );
      }

      if (showHBonds) {
        addHBondLines();
      }

      viewer.render();
      document.getElementById("status").innerText = "Affichage mis à jour";
    }

    function resetView() {
      viewer.zoomTo({model: 0, chain: "A"});
      viewer.zoom(0.72);
      viewer.render();
      document.getElementById("status").innerText = "Vue réinitialisée";
    }

    function zoomLigand() {
      viewer.zoomTo({model: 1, hetflag: true});
      viewer.zoom(0.90);
      viewer.render();
      document.getElementById("status").innerText = "Zoom sur le ligand";
    }

    function presetPocket() {
      document.getElementById("toggleProtein").checked = true;
      document.getElementById("togglePocket").checked = true;
      document.getElementById("toggleLigand").checked = true;
      document.getElementById("toggleHBonds").checked = true;
      updateScene();
      viewer.zoomTo({model: 1, hetflag: true});
      viewer.zoom(0.90);
      viewer.render();
      document.getElementById("status").innerText = "Preset pocket";
    }

    function presetCartoon() {
      document.getElementById("toggleProtein").checked = true;
      document.getElementById("togglePocket").checked = false;
      document.getElementById("toggleLigand").checked = true;
      document.getElementById("toggleHBonds").checked = false;
      updateScene();
      viewer.zoomTo({model: 0, chain: "A"});
      viewer.zoom(0.72);
      viewer.render();
      document.getElementById("status").innerText = "Preset cartoon";
    }

    function computeHBonds() {
      const ligandAtoms = ligandModel.selectedAtoms({
        model: 1,
        hetflag: true
      }).filter(a => ["N", "O", "S"].includes((a.elem || "").toUpperCase()));

      const proteinAtoms = proteinModel.selectedAtoms({
        model: 0,
        chain: "A"
      }).filter(a =>
        !a.hetflag && ["N", "O", "S"].includes((a.elem || "").toUpperCase())
      );

      const hb = [];
      const minDist = 2.0;
      const maxDist = 4.8;

      for (const la of ligandAtoms) {
        for (const pa of proteinAtoms) {
          const dx = la.x - pa.x;
          const dy = la.y - pa.y;
          const dz = la.z - pa.z;
          const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

          if (dist >= minDist && dist <= maxDist) {
            hb.push({
              start: {x: la.x, y: la.y, z: la.z},
              end: {x: pa.x, y: pa.y, z: pa.z}
            });
          }
        }
      }

      const filtered = [];
      for (const h of hb) {
        let keep = true;
        for (const f of filtered) {
          const d = Math.sqrt(
            (h.start.x - f.start.x)**2 +
            (h.start.y - f.start.y)**2 +
            (h.start.z - f.start.z)**2 +
            (h.end.x - f.end.x)**2 +
            (h.end.y - f.end.y)**2 +
            (h.end.z - f.end.z)**2
          );
          if (d < 0.35) {
            keep = false;
            break;
          }
        }
        if (keep) filtered.push(h);
      }

      return filtered;
    }

    function addHBondLines() {
      for (const h of hbonds) {
        viewer.addLine({
          start: h.start,
          end: h.end,
          dashed: true,
          color: "black",
          linewidth: 18
        });
      }
    }

    loadScene();
  </script>
</body>
</html>
