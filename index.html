<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Protein-Ligand Viewer</title>

<script src="https://3Dmol.org/build/3Dmol-min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f9;
}

.container {
  padding: 20px;
}

.layout {
  display: flex;
  gap: 20px;
}

.sidepanel {
  width: 300px;
  background: white;
  border-radius: 12px;
  padding: 15px;
  z-index: 10;
}

.viewerpanel {
  flex: 1;
  background: white;
  border-radius: 12px;
  overflow: hidden;
}

#viewer {
  width: 100%;
  height: 750px;
}

.checkbox {
  margin-bottom: 10px;
}

button {
  margin-top: 10px;
  padding: 8px 12px;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Protein-Ligand Viewer</h2>

<div class="layout">

<div class="sidepanel">

<label class="checkbox">
<input type="checkbox" id="protein" checked onchange="updateScene()"> Protéine
</label>

<label class="checkbox">
<input type="checkbox" id="pocket" checked onchange="updateScene()"> Poche catalytique
</label>

<label class="checkbox">
<input type="checkbox" id="ligand" checked onchange="updateScene()"> Ligand
</label>

<label class="checkbox">
<input type="checkbox" id="hbonds" checked onchange="updateScene()"> Liaisons H
</label>

<button onclick="zoomLigand()">Zoom ligand</button>
<button onclick="resetView()">Reset</button>

</div>

<div class="viewerpanel">
<div id="viewer"></div>
</div>

</div>
</div>

<script>

let viewer, proteinModel, ligandModel, hbonds=[];

async function loadScene() {

const protein = await fetch("./1a4l_protein.pdb").then(r=>r.text());
const ligand = await fetch("./ligand_only.pdb").then(r=>r.text());

viewer = $3Dmol.createViewer("viewer",{backgroundColor:"white"});

proteinModel = viewer.addModel(protein,"pdb");
ligandModel = viewer.addModel(ligand,"pdb");

hbonds = computeHBonds();

updateScene();

viewer.zoomTo({model:1});
viewer.zoom(0.9);
viewer.render();
}

function updateScene() {

viewer.setStyle({}, {});
viewer.removeAllShapes();

let showProtein = document.getElementById("protein").checked;
let showPocket = document.getElementById("pocket").checked;
let showLigand = document.getElementById("ligand").checked;
let showHBonds = document.getElementById("hbonds").checked;

/* PROTEINE */
if(showProtein){
viewer.setStyle(
{model:0, chain:"A"},
{cartoon:{color:"#e6d3a3"}}
);
}

/* LIGAND */
if(showLigand){
viewer.setStyle(
{model:1},
{stick:{colorscheme:"cyanCarbon", radius:0.35}}
);
}

/* POCHE */
if(showPocket){
viewer.setStyle(
{
model:0,
chain:"A",
within:{distance:8, sel:{model:1}}
},
{
stick:{
colorscheme:"magentaCarbon",
radius:0.45
}
}
);
}

/* LIAISONS H */
if(showHBonds){
hbonds.forEach(h=>{
viewer.addLine({
start:h.start,
end:h.end,
dashed:true,
color:"black",
linewidth:25
});
});
}

viewer.render();
}

function computeHBonds(){

let ligAtoms = ligandModel.selectedAtoms({})
.filter(a=>["N","O","S"].includes((a.elem||"").toUpperCase()));

let protAtoms = proteinModel.selectedAtoms({chain:"A"})
.filter(a=>["N","O","S"].includes((a.elem||"").toUpperCase()));

let hb=[];

for(let la of ligAtoms){
for(let pa of protAtoms){

let dx=la.x-pa.x;
let dy=la.y-pa.y;
let dz=la.z-pa.z;

let d=Math.sqrt(dx*dx+dy*dy+dz*dz);

if(d>2 && d<5.5){
hb.push({
start:{x:la.x,y:la.y,z:la.z},
end:{x:pa.x,y:pa.y,z:pa.z}
});
}
}
}

return hb;
}

function zoomLigand(){
viewer.zoomTo({model:1});
viewer.zoom(1.0);
viewer.render();
}

function resetView(){
viewer.zoomTo({model:0, chain:"A"});
viewer.zoom(0.7);
viewer.render();
}

loadScene();

</script>

</body>
</html>
