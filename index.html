<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protein-Ligand Viewer</title>
  <script src="https://3Dmol.org/build/3Dmol-min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    .container {
      max-width: 1500px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px 0;
    }

    .subtitle {
      margin-bottom: 14px;
      color: #555;
    }

    .layout {
      display: flex;
      gap: 18px;
      position: relative;
      z-index: 0;
    }

    .sidepanel {
      width: 320px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      padding: 18px;
      position: relative;
      z-index: 100;
      flex-shrink: 0;
    }

    .viewerpanel {
      flex: 1;
      background: white;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    #viewer {
      width: 100%;
      height: 780px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
    }

    .beige { background: #e6d3a3; }
    .magenta { background: #ff00ff; }
    .cyan { background: #00d7df; }
    .black { background: #111111; }

    button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>
<div class="container">

<h1>Protein-Ligand Viewer</h1>
<div class="subtitle">
Chaîne A, poche catalytique en évidence, ligand en cyan, liaisons H pointillées noires.
</div>

<div class="layout">

<div class="sidepanel">

<label class="checkbox-row">
<input type="checkbox" id="toggleProtein" checked onchange="updateScene()">
<div class="swatch beige"></div>
Protéine
</label>

<label class="checkbox-row">
<input type="checkbox" id="togglePocket" checked onchange="updateScene()">
<div class="swatch magenta"></div>
Poche catalytique
</label>

<label class="checkbox-row">
<input type="checkbox" id="toggleLigand" checked onchange="updateScene()">
<div class="swatch cyan"></div>
Ligand
</label>

<label class="checkbox-row">
<input type="checkbox" id="toggleHBonds" checked onchange="updateScene()">
<div class="swatch black"></div>
Liaisons H
</label>

<button onclick="resetView()">Reset</button>
<button onclick="zoomLigand()">Zoom ligand</button>

</div>

<div class="viewerpanel">
<div id="viewer"></div>
</div>

</div>
</div>

<script>

let viewer, proteinModel, ligandModel;
let hbonds = [];

async function loadScene() {
  const protein = await fetch("./1a4l_protein.pdb").then(r => r.text());
  const ligand = await fetch("./complex1.pdb").then(r => r.text());

  viewer = $3Dmol.createViewer("viewer", { backgroundColor: "white" });

  proteinModel = viewer.addModel(protein, "pdb");
  ligandModel = viewer.addModel(ligand, "pdb");

  computeHBonds();
  updateScene();

  viewer.zoomTo({model:1, hetflag:true});
  viewer.zoom(1.0);
  viewer.render();
}

function computeHBonds() {
  const ligandAtoms = ligandModel.selectedAtoms({model:1, hetflag:true})
    .filter(a => ["N","O","S"].includes((a.elem || "").toUpperCase()));

  const proteinAtoms = proteinModel.selectedAtoms({model:0, chain:"A"})
    .filter(a => !a.hetflag && ["N","O","S"].includes((a.elem || "").toUpperCase()));

  hbonds = [];

  const minDist = 1.8;
  const maxDist = 6.0;   // cutoff élevé pour afficher beaucoup plus de liaisons

  for (const la of ligandAtoms) {
    for (const pa of proteinAtoms) {
      const dx = la.x - pa.x;
      const dy = la.y - pa.y;
      const dz = la.z - pa.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

      if (dist >= minDist && dist <= maxDist) {
        hbonds.push({
          start: {x: la.x, y: la.y, z: la.z},
          end: {x: pa.x, y: pa.y, z: pa.z},
          dist: dist
        });
      }
    }
  }
}

function updateScene() {

  const showProtein = document.getElementById("toggleProtein").checked;
  const showPocket = document.getElementById("togglePocket").checked;
  const showLigand = document.getElementById("toggleLigand").checked;
  const showHBonds = document.getElementById("toggleHBonds").checked;

  viewer.setStyle({}, {});
  viewer.removeAllShapes();

  // cacher tout
  viewer.setStyle({model:0}, {cartoon:{hidden:true}, line:{hidden:true}, stick:{hidden:true}, sphere:{hidden:true}});
  viewer.setStyle({model:1}, {cartoon:{hidden:true}, line:{hidden:true}, stick:{hidden:true}, sphere:{hidden:true}});

  // PROTEINE chaine A
  if (showProtein) {
    viewer.setStyle(
      {model:0, chain:"A"},
      {cartoon:{color:"#e6d3a3", opacity: showPocket ? 0.82 : 1.0}}
    );
  }

  // POCHE ultra visible
  if (showPocket) {
    viewer.setStyle(
      {
        model:0,
        chain:"A",
        within:{distance:8, sel:{model:1, hetflag:true}}
      },
      {
        stick:{
          color:"#ff00ff",
          radius:0.42
        }
      }
    );
  }

  // LIGAND
  if (showLigand) {
    viewer.setStyle(
      {model:1, hetflag:true},
      {stick:{colorscheme:"cyanCarbon", radius:0.32}}
    );
  }

  // LIAISONS H grosses et pointillées
  if (showHBonds) {
    for (const h of hbonds) {
      viewer.addLine({
        start: h.start,
        end: h.end,
        dashed: true,
        color: "black",
        linewidth: 28
      });
    }
  }

  viewer.render();
}

function resetView(){
  viewer.zoomTo({model:0, chain:"A"});
  viewer.zoom(0.8);
  viewer.render();
}

function zoomLigand(){
  viewer.zoomTo({model:1, hetflag:true});
  viewer.zoom(1.15);
  viewer.render();
}

loadScene();

</script>
</body>
</html>
