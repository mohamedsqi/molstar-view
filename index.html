<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protein-Ligand Viewer</title>
  <script src="https://3Dmol.org/build/3Dmol-min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #222;
    }

    .container {
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    .subtitle {
      margin-bottom: 14px;
      color: #555;
      line-height: 1.5;
    }

    .layout {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }

    .sidepanel {
      width: 320px;
      min-width: 320px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      padding: 18px;
      flex-shrink: 0;
      position: relative;
      z-index: 20;
    }

    .viewerpanel {
      flex: 1;
      min-width: 0;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .section-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 15px;
    }

    .checkbox-row input {
      transform: scale(1.15);
      cursor: pointer;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid #aaa;
      flex: 0 0 auto;
    }

    .swatch-beige { background: #e6d3a3; }
    .swatch-magenta { background: #b000b5; }
    .swatch-cyan { background: #00d7df; }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }

    #viewer {
      width: 100%;
      height: 780px;
      position: relative;
      z-index: 1;
    }

    .status {
      padding: 12px 16px;
      font-size: 14px;
      color: #555;
      border-top: 1px solid #e5e7eb;
      background: #fafafa;
    }

    .tip {
      margin-top: 18px;
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    @media (max-width: 1100px) {
      .layout {
        flex-direction: column;
      }

      .sidepanel {
        width: 100%;
        min-width: 0;
      }

      #viewer {
        height: 620px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Protein-Ligand Viewer</h1>
    <div class="subtitle">
      Chaîne A uniquement, protéine en cartoon beige, poche catalytique en stick magenta, ligand en cyan.
    </div>

    <div class="layout">
      <div class="sidepanel">
        <div class="section-title">Légende interactive</div>

        <label class="checkbox-row">
          <input type="checkbox" id="toggleProtein" checked onchange="updateScene()">
          <span class="swatch swatch-beige"></span>
          <span>Hélices / protéine (chaîne A)</span>
        </label>

        <label class="checkbox-row">
          <input type="checkbox" id="togglePocket" checked onchange="updateScene()">
          <span class="swatch swatch-magenta"></span>
          <span>Poche catalytique</span>
        </label>

        <label class="checkbox-row">
          <input type="checkbox" id="toggleLigand" checked onchange="updateScene()">
          <span class="swatch swatch-cyan"></span>
          <span>Ligand</span>
        </label>

        <div class="button-row">
          <button onclick="resetView()">Reset View</button>
          <button onclick="zoomLigand()">Zoom ligand</button>
          <button onclick="presetPocket()">Preset pocket</button>
          <button onclick="presetCartoon()">Preset cartoon</button>
        </div>

        <div class="tip">
          La chaîne A est affichée en cartoon beige. La poche catalytique correspond aux résidus de la chaîne A proches du ligand.
        </div>
      </div>

      <div class="viewerpanel">
        <div id="viewer"></div>
        <div id="status" class="status">Chargement...</div>
      </div>
    </div>
  </div>

  <script>
    let viewer = null;
    let proteinModel = null;
    let ligandModel = null;

    async function loadScene() {
      const status = document.getElementById("status");
      status.innerText = "Chargement des fichiers...";

      try {
        const proteinRes = await fetch("./1a4l_protein.pdb");
        if (!proteinRes.ok) throw new Error("Impossible de charger 1a4l_protein.pdb");
        const proteinPDB = await proteinRes.text();

        const ligandRes = await fetch("./complex1.pdb");
        if (!ligandRes.ok) throw new Error("Impossible de charger complex1.pdb");
        const ligandPDB = await ligandRes.text();

        viewer = $3Dmol.createViewer("viewer", { backgroundColor: "white" });

        proteinModel = viewer.addModel(proteinPDB, "pdb");
        ligandModel = viewer.addModel(ligandPDB, "pdb");

        updateScene();

        viewer.zoomTo({model: 0, chain: "A"});
        viewer.zoom(0.72);
        viewer.render();

        status.innerText = "Structure chargée avec succès";
      } catch (err) {
        status.innerText = "Erreur : " + err.message;
        console.error(err);
      }
    }

    function getCheckboxValue(id) {
      return document.getElementById(id).checked;
    }

    function updateScene() {
      const showProtein = getCheckboxValue("toggleProtein");
      const showPocket = getCheckboxValue("togglePocket");
      const showLigand = getCheckboxValue("toggleLigand");

      viewer.setStyle({}, {});

      // cacher tout le modèle protéine par défaut
      viewer.setStyle(
        {model: 0},
        {line: {hidden: true}, stick: {hidden: true}, sphere: {hidden: true}, cartoon: {hidden: true}}
      );

      // afficher seulement la chaîne A en cartoon beige
      if (showProtein) {
        viewer.setStyle(
          {model: 0, chain: "A"},
          {cartoon: {color: "#e6d3a3", opacity: 1.0}}
        );
      }

      // poche catalytique en stick magenta
      if (showPocket) {
        viewer.setStyle(
          {
            model: 0,
            chain: "A",
            within: {distance: 7, sel: {model: 1, hetflag: true}}
          },
          {stick: {colorscheme: "magentaCarbon", radius: 0.22}}
        );
      }

      // cacher tout le modèle ligand par défaut
      viewer.setStyle(
        {model: 1},
        {line: {hidden: true}, stick: {hidden: true}, sphere: {hidden: true}, cartoon: {hidden: true}}
      );

      // ligand cyan
      if (showLigand) {
        viewer.setStyle(
          {model: 1, hetflag: true},
          {stick: {colorscheme: "cyanCarbon", radius: 0.28}}
        );
      }

      viewer.render();
      document.getElementById("status").innerText = "Affichage mis à jour";
    }

    function resetView() {
      viewer.zoomTo({model: 0, chain: "A"});
      viewer.zoom(0.72);
      viewer.render();
      document.getElementById("status").innerText = "Vue réinitialisée";
    }

    function zoomLigand() {
      viewer.zoomTo({model: 1, hetflag: true});
      viewer.zoom(0.92);
      viewer.render();
      document.getElementById("status").innerText = "Zoom sur le ligand";
    }

    function presetPocket() {
      document.getElementById("toggleProtein").checked = true;
      document.getElementById("togglePocket").checked = true;
      document.getElementById("toggleLigand").checked = true;
      updateScene();
      viewer.zoomTo({model: 1, hetflag: true});
      viewer.zoom(0.92);
      viewer.render();
      document.getElementById("status").innerText = "Preset pocket";
    }

    function presetCartoon() {
      document.getElementById("toggleProtein").checked = true;
      document.getElementById("togglePocket").checked = false;
      document.getElementById("toggleLigand").checked = true;
      updateScene();
      viewer.zoomTo({model: 0, chain: "A"});
      viewer.zoom(0.72);
      viewer.render();
      document.getElementById("status").innerText = "Preset cartoon";
    }

    loadScene();
  </script>
</body>
</html>
